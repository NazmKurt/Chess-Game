<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flask Chess AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <div class="container">
        <h1>Chess</h1>

        <div class="status-bar">
            <div><strong>Turn:</strong> <span id="turn">White</span></div>
            <div><strong>Status:</strong> <span id="game-status">In progress</span></div>
            <button id="reset-btn">Reset Game</button>
        </div>

        <div class="game-layout">
            <div class="captured-panel">
                <h3>White Captures</h3>
                <div id="white-captures" class="captured-pieces"></div>
            </div>

            <div id="chessboard" class="chessboard" aria-label="Chess board"></div>

            <div class="captured-panel">
                <h3>Black Captures</h3>
                <div id="black-captures" class="captured-pieces"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
